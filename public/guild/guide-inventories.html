<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>Hướng dẫn - Quản lý Lọ/Chai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Segoe UI",sans-serif;background:#0f172a;color:#1e293b;height:100vh;display:flex;flex-direction:column}
.top-bar{background:#1e293b;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-bar h1{font-size:14px;font-weight:700}.slide-counter{font-size:12px;color:#94a3b8}
.progress{height:3px;background:#1e293b}.progress-bar{height:100%;background:linear-gradient(90deg,#059669,#10b981);transition:width .4s}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:210px;background:#1e293b;overflow-y:auto;padding:12px 0;flex-shrink:0}
.sidebar-item{padding:8px 16px;cursor:pointer;border-left:3px solid transparent;font-size:11px;color:#94a3b8;transition:all .2s}
.sidebar-item:hover{background:#0f172a;color:#e2e8f0}
.sidebar-item.active{border-left-color:#059669;color:#34d399;background:#0f172a;font-weight:700}
.sidebar-item .si-num{display:inline-block;width:18px;height:18px;border-radius:50%;background:#334155;color:#94a3b8;font-size:9px;font-weight:700;text-align:center;line-height:18px;margin-right:6px}
.sidebar-item.active .si-num{background:#059669;color:#fff}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;gap:20px}
.slide-area{flex:1;display:flex;flex-direction:column;gap:16px}
.slide-header{color:#fff}.slide-header .step-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#34d399;margin-bottom:4px}
.slide-header h2{font-size:20px;font-weight:800;margin-bottom:4px}.slide-header p{font-size:13px;color:#94a3b8}
.ui-frame{background:#fff;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.hotspot{position:absolute;width:26px;height:26px;border-radius:50%;background:#ef4444;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;box-shadow:0 0 0 4px rgba(239,68,68,.3);animation:pulse 2s infinite}
.hotspot.blue{background:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.3)}
.hotspot.green{background:#059669;box-shadow:0 0 0 4px rgba(5,150,105,.3)}
.hotspot.orange{background:#d97706;box-shadow:0 0 0 4px rgba(217,119,6,.3)}
.hotspot.purple{background:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.callout-panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.callout-card{background:#1e293b;border-radius:10px;padding:12px 14px;border-left:3px solid #ef4444}
.callout-card.blue{border-left-color:#2563eb}.callout-card.green{border-left-color:#059669}.callout-card.orange{border-left-color:#d97706}.callout-card.purple{border-left-color:#7c3aed}
.callout-num{display:inline-flex;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;font-size:10px;font-weight:800;align-items:center;justify-content:center;margin-bottom:6px}
.callout-num.blue{background:#2563eb}.callout-num.green{background:#059669}.callout-num.orange{background:#d97706}.callout-num.purple{background:#7c3aed}
.callout-title{font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:3px}
.callout-desc{font-size:11px;color:#94a3b8;line-height:1.5}
.callout-action{margin-top:6px;padding:4px 8px;background:#0f172a;border-radius:5px;font-size:10px;color:#34d399;font-weight:600}
.nav-footer{background:#1e293b;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-btn{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.nav-btn.prev{background:#334155;color:#e2e8f0}.nav-btn.next{background:#059669;color:#fff}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.mu{font-family:"Segoe UI",sans-serif;font-size:12px}
.mu-bar{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:8px 12px;display:flex;gap:6px}
.mu-tab{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;color:#64748b}
.mu-tab.a{background:#2563eb;color:#fff}
.mu-toolbar{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9}
.mu-search{display:flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:4px 10px;min-width:180px;font-size:11px;color:#94a3b8}
.mu-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid #e2e8f0;background:#fff;color:#374151;cursor:pointer}
.mu-btn.p{background:#2563eb;color:#fff;border-color:#2563eb}
.mu-btn.g{background:#059669;color:#fff;border-color:#059669}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:#f8fafc;padding:6px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;color:#64748b;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.tbl td{padding:7px 10px;border-bottom:1px solid #f8fafc;white-space:nowrap}
.tbl tr.sel td{background:#f0fdf4}.tbl tr:hover td{background:#f8fafc}
.mono{font-family:monospace;font-size:10px;color:#2563eb;font-weight:700}.muted{color:#94a3b8}
.badge{display:inline-flex;padding:2px 7px;border-radius:999px;font-size:9px;font-weight:700;border:1px solid}
.badge.g{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
.badge.b{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe}
.badge.r{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
.badge.y{background:#fef9c3;color:#854d0e;border-color:#fde047}
.badge.o{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.badge.gray{background:#f1f5f9;color:#475569;border-color:#e2e8f0}
.sp{width:230px;border-left:1px solid #e2e8f0;background:#fafafa;font-size:11px;flex-shrink:0}
.sp-h{padding:8px 12px;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:12px;display:flex;justify-content:space-between}
.sp-b{padding:10px 12px}
.fl{font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:2px}
.fv{font-size:12px;font-weight:600;margin-bottom:8px}
.pg{padding:6px 12px;background:#fafafa;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:3px}
.pgb{width:22px;height:22px;border-radius:4px;border:1px solid #e2e8f0;background:#fff;font-size:10px;cursor:pointer;font-weight:700}
.pgb.a{background:#2563eb;color:#fff;border-color:#2563eb}
.sel-bar{background:#eff6ff;border-bottom:1px solid #bfdbfe;padding:7px 12px;display:flex;align-items:center;gap:8px;font-size:11px;color:#2563eb}

let c=0;
function r(){
const s=S[c];
document.getElementById("sl").textContent=s.l;
document.getElementById("sh").textContent=s.t;
document.getElementById("sp").textContent=s.d;
document.getElementById("ctr").textContent="Slide "+(c+1)+" / "+S.length;
document.getElementById("pb").style.width=((c+1)/S.length*100)+"%";
const uf=document.getElementById("uf");uf.innerHTML=s.html;
(s.hs||[]).forEach(h=>{const el=document.createElement("div");el.className="hotspot"+(h.c?" "+h.c:"");el.textContent=h.n;el.style.top=h.t;el.style.left=h.l;uf.appendChild(el);});
document.getElementById("cp").innerHTML=(s.cs||[]).map(x=>`<div class="callout-card ${x.c}">${x.n?`<div class="callout-num ${x.c}">${x.n}</div>`:"<div style='font-size:18px;margin-bottom:4px'>"+(x.c==="green"?"✅":"⚠️")+"</div>"}<div class="callout-title">${x.t}</div><div class="callout-desc">${x.d}</div><div class="callout-action">${x.a}</div></div>`).join("");
document.getElementById("sb").innerHTML=S.map((s,i)=>`<div class="sidebar-item${i===c?" active":""}" onclick="g(${i})"><span class="si-num">${i+1}</span>${s.l.split("·")[1]?.trim()||s.t}</div>`).join("");
document.getElementById("dots").innerHTML=S.map((_,i)=>`<div onclick="g(${i})" style="width:8px;height:8px;border-radius:50%;cursor:pointer;background:${i===c?"#059669":"#334155"}"></div>`).join("");
document.getElementById("pB").disabled=c===0;
document.getElementById("nB").disabled=c===S.length-1;
}
function go(d){c=Math.max(0,Math.min(S.length-1,c+d));r();}
function g(i){c=i;r();}
r();
</script></body></html>
