<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Hướng dẫn - Danh mục Hóa chất</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: "Segoe UI", sans-serif;
                background: #0f172a;
                color: #1e293b;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .top-bar {
                background: #1e293b;
                color: #fff;
                padding: 10px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }
            .top-bar h1 {
                font-size: 14px;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .slide-counter {
                font-size: 12px;
                color: #94a3b8;
            }
            .progress {
                height: 3px;
                background: #1e293b;
            }
            .progress-bar {
                height: 100%;
                background: linear-gradient(90deg, #2563eb, #0ea5e9);
                transition: width 0.4s;
            }
            .main {
                flex: 1;
                display: flex;
                overflow: hidden;
            }
            .sidebar {
                width: 220px;
                background: #1e293b;
                overflow-y: auto;
                padding: 12px 0;
                flex-shrink: 0;
            }
            .sidebar-item {
                padding: 8px 16px;
                cursor: pointer;
                border-left: 3px solid transparent;
                transition: all 0.2s;
                font-size: 11px;
                color: #94a3b8;
            }
            .sidebar-item:hover {
                background: #0f172a;
                color: #e2e8f0;
            }
            .sidebar-item.active {
                border-left-color: #2563eb;
                color: #60a5fa;
                background: #0f172a;
                font-weight: 700;
            }
            .sidebar-item .si-num {
                display: inline-block;
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: #334155;
                color: #94a3b8;
                font-size: 9px;
                font-weight: 700;
                text-align: center;
                line-height: 18px;
                margin-right: 6px;
            }
            .sidebar-item.active .si-num {
                background: #2563eb;
                color: #fff;
            }
            .content {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                gap: 20px;
            }
            .slide-area {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .slide-header {
                color: #fff;
            }
            .slide-header .step-label {
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: #60a5fa;
                margin-bottom: 4px;
            }
            .slide-header h2 {
                font-size: 20px;
                font-weight: 800;
                margin-bottom: 4px;
            }
            .slide-header p {
                font-size: 13px;
                color: #94a3b8;
            }
            .ui-frame {
                background: #fff;
                border-radius: 10px;
                overflow: hidden;
                position: relative;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            }
            .hotspot {
                position: absolute;
                width: 26px;
                height: 26px;
                border-radius: 50%;
                background: #ef4444;
                color: #fff;
                font-size: 11px;
                font-weight: 800;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 10;
                box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.3);
                animation: pulse 2s infinite;
                transition: transform 0.2s;
            }
            .hotspot:hover {
                transform: scale(1.15);
            }
            .hotspot.blue {
                background: #2563eb;
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.3);
            }
            .hotspot.green {
                background: #16a34a;
                box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.3);
            }
            .hotspot.orange {
                background: #d97706;
                box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.3);
            }
            @keyframes pulse {
                0%,
                100% {
                    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.3);
                }
                50% {
                    box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.1);
                }
            }
            .callout-panel {
                width: 260px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .callout-card {
                background: #1e293b;
                border-radius: 10px;
                padding: 12px 14px;
                border-left: 3px solid #ef4444;
                animation: fadeIn 0.3s;
            }
            .callout-card.blue {
                border-left-color: #2563eb;
            }
            .callout-card.green {
                border-left-color: #16a34a;
            }
            .callout-card.orange {
                border-left-color: #d97706;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateX(10px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            .callout-num {
                display: inline-flex;
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: #ef4444;
                color: #fff;
                font-size: 10px;
                font-weight: 800;
                align-items: center;
                justify-content: center;
                margin-bottom: 6px;
            }
            .callout-num.blue {
                background: #2563eb;
            }
            .callout-num.green {
                background: #16a34a;
            }
            .callout-num.orange {
                background: #d97706;
            }
            .callout-title {
                font-size: 12px;
                font-weight: 700;
                color: #e2e8f0;
                margin-bottom: 3px;
            }
            .callout-desc {
                font-size: 11px;
                color: #94a3b8;
                line-height: 1.5;
            }
            .callout-action {
                margin-top: 6px;
                padding: 4px 8px;
                background: #0f172a;
                border-radius: 5px;
                font-size: 10px;
                color: #60a5fa;
                font-weight: 600;
            }
            .nav-footer {
                background: #1e293b;
                padding: 12px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }
            .nav-btn {
                padding: 7px 18px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 700;
                cursor: pointer;
                border: none;
                transition: all 0.2s;
            }
            .nav-btn.prev {
                background: #334155;
                color: #e2e8f0;
            }
            .nav-btn.prev:hover {
                background: #475569;
            }
            .nav-btn.next {
                background: #2563eb;
                color: #fff;
            }
            .nav-btn.next:hover {
                background: #1d4ed8;
            }
            .nav-btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            /* mini UI styles */
            .mu {
                font-family: "Segoe UI", sans-serif;
                font-size: 12px;
            }
            .mu-bar {
                background: #f8fafc;
                border-bottom: 1px solid #e2e8f0;
                padding: 8px 12px;
                display: flex;
                gap: 6px;
            }
            .mu-tab {
                padding: 5px 12px;
                border-radius: 5px;
                font-size: 11px;
                font-weight: 600;
                color: #64748b;
                cursor: pointer;
            }
            .mu-tab.a {
                background: #2563eb;
                color: #fff;
            }
            .mu-toolbar {
                padding: 8px 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                border-bottom: 1px solid #f1f5f9;
            }
            .mu-search {
                display: flex;
                align-items: center;
                gap: 5px;
                background: #f8fafc;
                border: 1px solid #e2e8f0;
                border-radius: 7px;
                padding: 4px 10px;
                min-width: 200px;
                font-size: 11px;
                color: #94a3b8;
            }
            .mu-btn {
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 11px;
                font-weight: 600;
                border: 1px solid #e2e8f0;
                background: #fff;
                color: #374151;
                cursor: pointer;
            }
            .mu-btn.p {
                background: #2563eb;
                color: #fff;
                border-color: #2563eb;
            }
            .mu-tbl {
                width: 100%;
                border-collapse: collapse;
                font-size: 11px;
            }
            .mu-tbl th {
                background: #f8fafc;
                padding: 6px 10px;
                text-align: left;
                font-size: 9px;
                font-weight: 700;
                text-transform: uppercase;
                color: #64748b;
                border-bottom: 2px solid #e2e8f0;
            }
            .mu-tbl td {
                padding: 7px 10px;
                border-bottom: 1px solid #f8fafc;
            }
            .mu-tbl tr.sel td {
                background: #eff6ff;
            }
            .mu-tbl tr:hover td {
                background: #f8fafc;
            }
            .mono {
                font-family: monospace;
                font-size: 10px;
                color: #2563eb;
                font-weight: 700;
            }
            .muted {
                color: #94a3b8;
            }
            .badge {
                display: inline-flex;
                padding: 2px 7px;
                border-radius: 999px;
                font-size: 9px;
                font-weight: 700;
                border: 1px solid;
            }
            .badge.g {
                background: #dcfce7;
                color: #15803d;
                border-color: #bbf7d0;
            }
            .badge.r {
                background: #fee2e2;
                color: #b91c1c;
                border-color: #fecaca;
            }
            .badge.o {
                background: #fff7ed;
                color: #c2410c;
                border-color: #fed7aa;
            }
            .badge.y {
                background: #fef9c3;
                color: #854d0e;
                border-color: #fde047;
            }
            .badge.gray {
                background: #f1f5f9;
                color: #475569;
                border-color: #e2e8f0;
            }
            .side-panel {
                width: 220px;
                border-left: 1px solid #e2e8f0;
                background: #fafafa;
                font-size: 11px;
            }
            .sp-head {
                padding: 8px 12px;
                border-bottom: 1px solid #e2e8f0;
                font-weight: 700;
                font-size: 12px;
                display: flex;
                justify-content: space-between;
            }
            .sp-body {
                padding: 10px 12px;
            }
            .fl {
                font-size: 9px;
                font-weight: 700;
                text-transform: uppercase;
                color: #94a3b8;
                margin-bottom: 2px;
            }
            .fv {
                font-size: 12px;
                font-weight: 600;
                margin-bottom: 8px;
            }
            .pg-bar {
                padding: 6px 12px;
                background: #fafafa;
                border-top: 1px solid #f1f5f9;
                display: flex;
                align-items: center;
                gap: 3px;
                font-size: 10px;
            }
            .pg-btn {
                width: 22px;
                height: 22px;
                border-radius: 4px;
                border: 1px solid #e2e8f0;
                background: #fff;
                font-size: 10px;
                cursor: pointer;
                font-weight: 700;
            }
            .pg-btn.a {
                background: #2563eb;
                color: #fff;
                border-color: #2563eb;
            }
        </style>
    </head>
    <body>
        <div class="top-bar">
            <h1>&#128213; Hướng dẫn · Tab Danh mục Hóa chất</h1>
            <span class="slide-counter" id="ctr">Slide 1 / 6</span>
        </div>
        <div class="progress"><div class="progress-bar" id="pb" style="width: 16.6%"></div></div>
        <div class="main">
            <div class="sidebar" id="sb"></div>
            <div class="content">
                <div class="slide-area">
                    <div class="slide-header">
                        <div class="step-label" id="sl"></div>
                        <h2 id="sh2"></h2>
                        <p id="sp"></p>
                    </div>
                    <div class="ui-frame" id="uf"></div>
                </div>
                <div class="callout-panel" id="cp"></div>
            </div>
        </div>
        <div class="nav-footer">
            <button class="nav-btn prev" id="pB" onclick="go(-1)">&#8592; Trước</button>
            <div style="display: flex; gap: 6px" id="dots"></div>
            <button class="nav-btn next" id="nB" onclick="go(1)">Tiếp theo &#8594;</button>
        </div>
        <script>
            var S = [
                {
                    l: "[1] Tổng quan",
                    t: "Giao diện danh mục SKU",
                    d: "Nơi khai báo và quản lý các loại hóa chất. Một SKU có thể chứa nhiều lọ/chai vật lý trong kho.",
                    ui: `<div class="mu"><div class="mu-bar"><div class="mu-tab">Lọ/Chai</div><div class="mu-tab a">Danh mục</div><div class="mu-tab">NCC</div></div><div class="mu-toolbar"><div class="mu-search"><span>🔍</span>Tìm kiếm...</div><button class="mu-btn p">+ Thêm Hóa chất</button></div><table class="mu-tbl"><thead><tr><th>Mã SKU</th><th>Tên hóa chất</th><th>Số CAS</th><th>Đơn vị</th><th>Phân loại</th><th style="text-align:right">Tồn kho</th></tr></thead><tbody><tr class="sel"><td class="mono">SKU-001</td><td style="font-weight:700">Hydrochloric Acid 37%</td><td class="muted">7647-01-0</td><td>mL</td><td><span class="badge o">C-Corrosive</span></td><td style="text-align:right;font-weight:700">1,250</td></tr><tr><td class="mono">SKU-002</td><td style="font-weight:700">Sulfuric Acid 98%</td><td class="muted">7664-93-9</td><td>mL</td><td><span class="badge o">C-Corrosive</span></td><td style="text-align:right;font-weight:700">850</td></tr></tbody></table></div>`,
                    hs: [
                        ["40px", "550px", "1", "blue"],
                        ["40px", "690px", "2", ""],
                    ],
                    cs: [
                        ["blue", "1", "Ô tìm kiếm", "Tìm nhanh theo mã định danh hoặc tên hóa chất.", "🔍 Nhập mã hoặc tên"],
                        ["", "2", "Nút thêm mới", "Khai báo loại hóa chất mới vào hệ thống.", "➕ Click để thêm SKU"],
                    ],
                },

                {
                    l: "[2] Lọc dữ liệu",
                    t: "Bộ lọc nâng cao",
                    d: "Hỗ trợ lọc hóa chất theo phân loại nguy hiểm (GHS) và các tiêu chí khác để quản lý an toàn.",
                    ui: `<div class="mu"><div class="mu-toolbar"><div><span class="badge gray">Tất cả phân loại ▾</span></div></div><table class="mu-tbl"><thead><tr><th>SKU</th><th>Tên</th><th>Phân loại ▾</th></tr></thead><tbody><tr><td class="mono">SKU-003</td><td>Acetone HPLC Grade</td><td><span class="badge r">F-Flammable</span></td></tr><tr><td class="mono">SKU-004</td><td>Sodium Hydroxide</td><td><span class="badge o">C-Corrosive</span></td></tr></tbody></table></div>`,
                    hs: [["34px", "12px", "1", "blue"]],
                    cs: [["blue", "1", "Lọc theo Phân loại", "Lọc nhanh danh sách theo tính chất hóa lý: Dễ cháy, Ăn mòn, Độc hại...", "⚡ Chọn nhãn phân loại"]],
                },

                {
                    l: "[3] Chi tiết SKU",
                    t: "Bảng thông tin chi tiết",
                    d: "Khi chọn 1 SKU, panel bên phải sẽ hiển thị thông tin cấu hình, tồn kho tổng và danh sách chai cụ thể.",
                    ui: `<div class="mu" style="display:flex"><div style="flex:1"><table class="mu-tbl"><thead><tr><th>SKU</th><th>Tên hóa chất</th></tr></thead><tbody><tr class="sel"><td class="mono">SKU-001</td><td style="font-weight:700">Hydrochloric Acid 37%</td></tr></tbody></table></div><div class="side-panel"><div class="sp-head">Chi tiết SKU</div><div class="sp-body"><div class="fl">Mã SKU</div><div class="fv mono" style="color:#2563eb">SKU-CHEM-0001</div><div class="fl">Tên hóa chất</div><div class="fv" style="font-weight:700">Hydrochloric Acid 37%</div><div class="fl">Tổng tồn kho</div><div class="fv" style="font-size:18px;font-weight:800;color:#2563eb">1,250 <span style="font-size:11px;color:#94a3b8">mL</span></div><div class="fl">Ngưỡng tối thiểu</div><div class="fv">200 mL</div></div></div></div>`,
                    hs: [["120px", "680px", "1", "green"]],
                    cs: [["green", "1", "Tổng tồn kho", "Dữ liệu aggregate (tổng) của tất cả các chai đang còn sử dụng trong kho.", "📊 Xem tổng mức tồn"]],
                },

                {
                    l: "[4] Danh sách chai",
                    t: "Phân bổ chai vật lý",
                    d: "Cuối panel chi tiết là danh sách các chai/lọ cụ thể thuộc SKU này, giúp biết chính xác vị trí và số lượng từng chai.",
                    ui: `<div class="mu" style="display:flex"><div style="flex:1"></div><div class="side-panel"><div class="sp-body"><div class="fl" style="margin-top:10px">Chai trong kho (2)</div><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px;margin-top:5px"><div class="mono" style="font-size:9px">BTL-00123</div><div style="display:flex;justify-content:space-between;font-size:10px"><span>LOT-24-05</span><span style="font-weight:700">550 mL</span></div></div><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px;margin-top:5px"><div class="mono" style="font-size:9px">BTL-00124</div><div style="display:flex;justify-content:space-between;font-size:10px"><span>LOT-24-05</span><span style="font-weight:700">700 mL</span></div></div></div></div></div>`,
                    hs: [["70px", "650px", "1", ""]],
                    cs: [["", "1", "Thông tin từng chai", "Hiển thị mã barcode (BTL-xxx), số lô và lượng còn lại thực tế của mỗi chai.", "🧴 Click để xem chi tiết chai này"]],
                },
            ];
            var c = 0;
            function r() {
                var s = S[c];
                document.getElementById("sl").textContent = s.l;
                document.getElementById("sh2").textContent = s.t;
                document.getElementById("sp").textContent = s.d;
                document.getElementById("ctr").textContent = "Slide " + (c + 1) + " / " + S.length;
                document.getElementById("pb").style.width = ((c + 1) / S.length) * 100 + "%";
                var uf = document.getElementById("uf");
                uf.innerHTML = s.ui;
                (s.hs || []).forEach(function (h) {
                    var el = document.createElement("div");
                    el.className = "hotspot" + (h[3] ? " " + h[3] : "");
                    el.textContent = h[2];
                    el.style.top = h[0];
                    el.style.left = h[1];
                    uf.appendChild(el);
                });
                document.getElementById("cp").innerHTML = (s.cs || [])
                    .map(function (x) {
                        var ico = x[0] ? '<div class="callout-num ' + x[0] + '">' + x[1] + "</div>" : '<div style="font-size:16px;margin-bottom:4px">💡</div>';
                        return (
                            '<div class="callout-card ' +
                            x[0] +
                            '">' +
                            ico +
                            '<div class="callout-title">' +
                            x[2] +
                            '</div><div class="callout-desc">' +
                            x[3] +
                            '</div><div class="callout-action">' +
                            x[4] +
                            "</div></div>"
                        );
                    })
                    .join("");
                document.getElementById("sb").innerHTML = S.map(function (s, i) {
                    return '<div class="sidebar-item' + (i === c ? " active" : "") + '" onclick="g(' + i + ')"><span class="si-num">' + (i + 1) + "</span>" + s.l.replace(/^\[\d+\] /, "") + "</div>";
                }).join("");
                document.getElementById("dots").innerHTML = S.map(function (_, i) {
                    return '<div onclick="g(' + i + ')" style="width:8px;height:8px;border-radius:50%;cursor:pointer;background:' + (i === c ? "#2563eb" : "#334155") + ';transition:all .2s"></div>';
                }).join("");
                document.getElementById("pB").disabled = c === 0;
                document.getElementById("nB").disabled = c === S.length - 1;
            }
            function go(d) {
                c = Math.max(0, Math.min(S.length - 1, c + d));
                r();
            }
            function g(i) {
                c = i;
                r();
            }
            r();
        </script>
    </body>
</html>
